services:
  redis:
    image: redis:7.2-alpine
    container_name: rate-limiter-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: distributed-rate-limiter-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET_BASE64: c3VwZXItc2VjcmV0LWtleS1jaGFuZ2UtbWUtdG8tYS1wcm9wZXItMzItYnl0ZS1zZWNyZXQ=
      ACTUATOR_API_KEY: ${ACTUATOR_API_KEY:-change-me-actuator-key}
      INTERNAL_ROUTING_TOKEN: ${INTERNAL_ROUTING_TOKEN:-change-me-internal-routing-token}
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: rate-limiter-prometheus
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerting/rate-limiter-alerts.yml:/etc/prometheus/alerts/rate-limiter-alerts.yml:ro
    depends_on:
      gateway:
        condition: service_started
      alertmanager:
        condition: service_started

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: rate-limiter-alertmanager
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./monitoring/alerting/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    container_name: rate-limiter-grafana
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-grafana-password}
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
    depends_on:
      prometheus:
        condition: service_started
