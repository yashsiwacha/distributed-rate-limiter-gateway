<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-label="Distributed Rate Limiter Gateway hero image">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b1020" />
      <stop offset="100%" stop-color="#1a2d5f" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
  </defs>

  <rect width="1400" height="620" fill="url(#bg)" />

  <g opacity="0.2">
    <circle cx="1250" cy="120" r="220" fill="#34d399" />
    <circle cx="180" cy="520" r="180" fill="#22d3ee" />
  </g>

  <text x="90" y="170" fill="#e2e8f0" font-size="34" font-family="Segoe UI, Arial, sans-serif" letter-spacing="2">
    DISTRIBUTED RATE LIMITER + API GATEWAY
  </text>

  <text x="90" y="240" fill="#ffffff" font-size="62" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    Secure. Resilient. Observable.
  </text>

  <text x="90" y="300" fill="#cbd5e1" font-size="30" font-family="Segoe UI, Arial, sans-serif">
    JWT Auth • Redis Lua Limits • Circuit Breaker • Prometheus / Grafana
  </text>

  <rect x="90" y="355" width="820" height="8" rx="4" fill="url(#accent)" />

  <g transform="translate(90,400)">
    <rect x="0" y="0" width="220" height="110" rx="14" fill="#111827" stroke="#374151" />
    <text x="18" y="38" fill="#94a3b8" font-size="18" font-family="Segoe UI, Arial, sans-serif">Gateway</text>
    <text x="18" y="76" fill="#ffffff" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">/api/**</text>

    <rect x="260" y="0" width="220" height="110" rx="14" fill="#111827" stroke="#374151" />
    <text x="278" y="38" fill="#94a3b8" font-size="18" font-family="Segoe UI, Arial, sans-serif">Rate Limit</text>
    <text x="278" y="76" fill="#ffffff" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Redis Lua</text>

    <rect x="520" y="0" width="220" height="110" rx="14" fill="#111827" stroke="#374151" />
    <text x="538" y="38" fill="#94a3b8" font-size="18" font-family="Segoe UI, Arial, sans-serif">Visibility</text>
    <text x="538" y="76" fill="#ffffff" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Metrics</text>
  </g>
</svg>
