apiVersion: apps/v1
kind: Deployment
metadata:
  name: distributed-rate-limiter-gateway
  labels:
    app: distributed-rate-limiter-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: distributed-rate-limiter-gateway
  template:
    metadata:
      labels:
        app: distributed-rate-limiter-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/your-org/distributed-rate-limiter-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: gateway-config
            - secretRef:
                name: gateway-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
