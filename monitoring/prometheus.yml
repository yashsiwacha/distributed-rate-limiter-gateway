global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/rate-limiter-alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: gateway
    metrics_path: /actuator/prometheus
    scheme: http
    http_headers:
      X-Actuator-Key:
        values:
          - change-me-actuator-key
    static_configs:
      - targets:
          - gateway:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: distributed-rate-limiter-gateway

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
